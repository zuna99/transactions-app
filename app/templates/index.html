<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >
    <title>Business Transactions</title>
    <link
        rel="stylesheet"
        href="{{ url_for('static', path='/styles.css') }}"
    >
</head>

<body>
<main class="container">
    <header>
        <h1>Business Transactions</h1>
        <p>View, add and edit transaction records.</p>
    </header>

    <section class="card">
        <h2 id="form-title">Add transaction</h2>

        <form id="transaction-form">
            <input type="hidden" id="transaction-id">

            <div class="form-grid">
                <label>
                    Account number
                    <input id="account-number" required>
                </label>

                <label>
                    Statement period
                    <input
                        id="statement-period"
                        placeholder="2026-08"
                        required
                    >
                </label>

                <label>
                    Transaction date
                    <input
                        id="transaction-date"
                        type="date"
                        required
                    >
                </label>

                <label>
                    Booking date
                    <input
                        id="booking-date"
                        type="date"
                        required
                    >
                </label>

                <label>
                    Reference number
                    <input id="reference-number" required>
                </label>

                <label>
                    Transaction type
                    <input id="transaction-type" required>
                </label>

                <label>
                    Amount
                    <input
                        id="amount"
                        type="number"
                        step="0.01"
                        required
                    >
                </label>

                <label>
                    Currency
                    <input
                        id="currency"
                        maxlength="3"
                        required
                    >
                </label>

                <label>
                    Counterparty
                    <input id="counterparty-name" required>
                </label>

                <label>
                    Category
                    <input id="category" required>
                </label>
            </div>

            <div class="actions">
                <button type="submit">Save</button>

                <button
                    type="button"
                    id="cancel-edit"
                    class="secondary"
                    hidden
                >
                    Cancel edit
                </button>
            </div>

            <p id="message"></p>
        </form>
    </section>

    <section class="card">
        <div class="table-header">
            <h2>Transactions</h2>

            <div class="table-controls">
                <select id="sort-by">
                <option value="date">Sort by date</option>
                <option value="id">Sort by ID</option>
                <option value="category">Sort by category</option>
            </select>

            <select id="sort-order">
                <option value="desc">Descending</option>
                <option value="asc">Ascending</option>
            </select>

            <input
                id="search"
                placeholder="Search records..."
            >

            <button id="search-button">Search</button>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Account</th>
                    <th>Date</th>
                    <th>Reference</th>
                    <th>Type</th>
                    <th>Amount</th>
                    <th>Currency</th>
                    <th>Counterparty</th>
                    <th>Category</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody id="transactions-body"></tbody>
            </table>
        </div>

        <div class="pagination">
            <button id="previous-page">Previous</button>
            <span id="page-info"></span>
            <button id="next-page">Next</button>
        </div>
    </section>
</main>

<script src="{{ url_for('static', path='/app.js') }}"></script>
</body>
</html>
